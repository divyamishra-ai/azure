name: WebApi Build & Deploy

permissions:
  contents: write

env:
  APP_DIR: "Amplify.WebApi.v1"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - "wip/api/*"
      - "feature/api/*"
      - "consolidate/api/*"
      - "qa/api-poc*"
      - "rc/api-poc*"

  push:
    branches:
      - main
      - "feature/api/*"  
      - "wip/api/*"
      - "consolidate/api/*"
      - "qa/api-poc*"
      - "rc/api-poc*"

jobs:

# 🔐 Epic ID Validation (PR level)
  validate-epic-id:
    name: Validate Epic ID
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Checking branch: $BRANCH"

          if [[ ! "$BRANCH" =~ EPIC-[0-9]+ ]]; then
            echo "❌ Epic ID missing"
            exit 1
          else
            echo "✅ Epic ID present"
          fi

# 🔍 Secrets Scan
  gitleaks-scan:
    name: Secrets Scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PLATFORM_GIT_TOKEN }}
          persist-credentials: false

      - name: Fix Auth
        run: |
          git config --global url."https://x-access-token:${{ secrets.PLATFORM_GIT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Scan
        run: docker run --rm -v ${{ github.workspace }}/Amplify/${{ env.APP_DIR }}:/target zricethezav/gitleaks:latest detect --source="/target" --no-git

# 🔄 Sync main → feature
  sync-main-to-feature:
    name: Sync main to feature branches
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PLATFORM_GIT_TOKEN }}
          persist-credentials: false

      - name: Fix Auth
        run: |
          git config --global url."https://x-access-token:${{ secrets.PLATFORM_GIT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Sync branches
        run: |
          git fetch origin '+refs/heads/*:refs/remotes/origin/*'

          for branch in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin/feature/ | sed 's/origin\///'); do
            echo "Syncing $branch"
            git checkout -B $branch origin/$branch
            git merge origin/main || echo "Conflict in $branch"
            git push origin $branch || echo "Push failed"
          done

# 🏗️ Build
  ci-build:
    if: github.event_name == 'push'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PLATFORM_GIT_TOKEN }}
          persist-credentials: false

      - name: Fix Auth
        run: |
          git config --global url."https://x-access-token:${{ secrets.PLATFORM_GIT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "3.1"

      - name: Build
        run: dotnet build Amplify\${{ env.APP_DIR }}\${{ env.APP_DIR }}.csproj --configuration Release

# 🚫 PR creation logic (STRICT ✅)
  create-qa-pr:
    name: Auto-create PR
    if: ${{ github.event_name == 'push' && startsWith(github.ref_name, 'feature/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check EPIC ID
        id: check
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Branch: $BRANCH"

          if [[ "$BRANCH" =~ EPIC-[0-9]+ ]]; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no EPIC
        if: steps.check.outputs.valid == 'false'
        run: |
          echo "❌ No EPIC ID → PR NOT created"
          exit 0

      - uses: actions/checkout@v4
        if: steps.check.outputs.valid == 'true'
        with:
          token: ${{ secrets.PLATFORM_GIT_TOKEN }}

      - name: Create PR
        if: steps.check.outputs.valid == 'true'
        run: |
          echo "✅ EPIC present → PR can be created"

# 🔔 Teams Notification
  notify-teams:
    name: Notify Teams
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Send notification
        run: |
          STATUS="${{ job.status }}"
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"text\": \"Repo: ${{ github.repository }} | Branch: ${{ github.ref_name }} | Status: $STATUS\"}" \
          "${{ secrets.TEAMS_WEBHOOK_URL }}"
