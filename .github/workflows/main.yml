name: WebApi Build & Deploy

env:
  APP_DIR: "Amplify.WebApi.v1"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - "wip/api/*"
      - "feature/api/*"
      - "consolidate/api/*"
      - "qa/api-poc*"
      - "rc/api-poc*"
    paths:
      - "Amplify/Amplify.WebApi.v1/**"

  push:
    branches:
      - main   # ✅ ADDED
      - "wip/api/*"
      - "consolidate/api/*"
      - "qa/api-poc*"
      - "rc/api-poc*"
    paths:
      - "Amplify/Amplify.WebApi.v1/**"

jobs:

  gitleaks-scan:
    name: Secrets Scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PLATFORM_GIT_TOKEN }}

      - name: Scan for Hardcoded Secrets with Gitleaks
        run: docker run --rm -v ${{ github.workspace }}/Amplify/${{ env.APP_DIR }}:/target zricethezav/gitleaks:latest detect --source="/target" --no-git -v --report-format="json" --report-path="/target/gitleaks-report.json"
        continue-on-error: true

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: Amplify/${{ env.APP_DIR }}/gitleaks-report.json
          retention-days: 7

  ci-build:
    if: ${{ github.event_name == 'push' }}
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1
          clean: true
          token: ${{ secrets.PLATFORM_GIT_TOKEN }}

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "3.1"

      - name: Build with dotnet
        run: dotnet build Amplify\${{ env.APP_DIR }}\${{ env.APP_DIR }}.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish Amplify\${{ env.APP_DIR }}\${{ env.APP_DIR }}.csproj -c Release -o "${{ env.APP_DIR }}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.APP_DIR }}/myapp

  deploy-approval:
    needs: ci-build
    if: ${{ github.event_name == 'push' && !startsWith(github.ref_name, 'feature/') && !startsWith(github.base_ref, 'feature/') }}
    runs-on: ubuntu-latest

    environment:
      name: ${{ startsWith(github.ref_name, 'wip') && 'team-qa' || startsWith(github.ref_name, 'qa') && 'team-qa' || startsWith(github.ref_name, 'rc') && 'team-qa' || startsWith(github.ref_name, 'release') && 'production' || 'dev' }}

    outputs:
      webapp_name: ${{ steps.resolve-webapp.outputs.webapp_name }}

    steps:
      - name: Resolve WebApp Name
        id: resolve-webapp
        run: echo "webapp_name=app-amp-qa-pltfm-westus-fixapi" >> $GITHUB_OUTPUT

  create-qa-pr:
    name: Auto-create PR
    if: ${{ github.event_name == 'push' && (startsWith(github.ref_name, 'consolidate/api/') || startsWith(github.ref_name, 'qa/api-poc')) }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PLATFORM_GIT_TOKEN }}

  deploy:
    needs: deploy-approval
    if: ${{ github.event_name == 'push' && !startsWith(github.ref_name, 'feature/') }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploy step"

  # ✅🔥 NEW JOB (SYNC LOGIC)
  sync-main-to-feature:
    name: Sync Main to Feature Branches
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PLATFORM_GIT_TOKEN }}
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Sync main into feature branches
        run: |
          for branch in $(git branch -r | grep 'origin/feature/api/' | sed 's/origin\///'); do
            echo "🔄 Syncing $branch"
            git checkout $branch
            git merge origin/main --no-edit || true
            git push origin $branch || true
          done
