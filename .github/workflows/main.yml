name: WebApi Build & Deploy

permissions:
  contents: write

env:
  APP_DIR: "Amplify.WebApi.v1"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - "wip/api/*"
      - "feature/api/*"
      - "consolidate/api/*"
      - "qa/api-poc*"
      - "rc/api-poc*"
#    paths:
#      - "Amplify/Amplify.WebApi.v1/**"

  push:
    branches:
      - main
      - "wip/api/*"
      - "consolidate/api/*"
      - "qa/api-poc*"
      - "rc/api-poc*"
#    paths:
#      - "Amplify/Amplify.WebApi.v1/**"

jobs:

# 🔐 Epic ID Validation (ADDED)
  validate-epic-id:
    name: Validate Epic ID
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Checking branch: $BRANCH"

          if [[ ! "$BRANCH" =~ EPIC-[0-9]+ ]]; then
            echo "❌ Epic ID missing (Example: EPIC-123)"
            exit 1
          else
            echo "✅ Epic ID present"
          fi

# 🔍 Existing Job (UNCHANGED except auth fix)
  gitleaks-scan:
    name: Secrets Scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PLATFORM_GIT_TOKEN }}
          persist-credentials: true

      - name: Scan for Hardcoded Secrets with Gitleaks
        run: docker run --rm -v ${{ github.workspace }}/Amplify/${{ env.APP_DIR }}:/target zricethezav/gitleaks:latest detect --source="/target" --no-git -v --report-format="json" --report-path="/target/gitleaks-report.json"
        continue-on-error: true

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: Amplify/${{ env.APP_DIR }}/gitleaks-report.json
          retention-days: 7

# 🔄 Sync main → feature (ADDED)
  sync-main-to-feature:
    name: Sync main to feature branches
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PLATFORM_GIT_TOKEN }}
          persist-credentials: true

      - name: Setup Git Auth
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
           git remote set-url origin https://x-access-token:${{ secrets.PLATFORM_GIT_TOKEN }}@github.com/${{ github.repository }}

      - name: Sync branches
        run: |
          git fetch origin '+refs/heads/*:refs/remotes/origin/*'

          for branch in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin/feature/ | sed 's/origin\///'); do
            echo "Syncing $branch"

            git checkout -B $branch origin/$branch
            git merge origin/main || echo "Conflict in $branch"
            git push origin $branch || echo "Push failed for $branch"
          done

# 🏗️ Existing Build (UNCHANGED except auth fix)
  ci-build:
    if: ${{ github.event_name == 'push' }}
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1
          clean: true
          token: ${{ secrets.PLATFORM_GIT_TOKEN }}
          persist-credentials: true

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "3.1"

      - name: Build with dotnet
        run: dotnet build Amplify\${{ env.APP_DIR }}\${{ env.APP_DIR }}.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish Amplify\${{ env.APP_DIR }}\${{ env.APP_DIR }}.csproj -c Release -o "${{ env.APP_DIR }}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.APP_DIR }}/myapp

# 🚀 Existing Deploy Approval (UNCHANGED)
  deploy-approval:
    needs: ci-build
    if: ${{ github.event_name == 'push' && !startsWith(github.ref_name, 'feature/') && !startsWith(github.base_ref, 'feature/') }}
    runs-on: ubuntu-latest

    environment:
      name: ${{ startsWith(github.ref_name, 'wip') && 'team-qa' || startsWith(github.ref_name, 'qa') && 'team-qa' || startsWith(github.ref_name, 'rc') && 'team-qa' || startsWith(github.ref_name, 'release') && 'production' || 'dev' }}

    outputs:
      webapp_name: ${{ steps.resolve-webapp.outputs.webapp_name }}

    steps:
      - name: Resolve WebApp Name
        id: resolve-webapp
        run: |
          echo "webapp_name=app-amp-qa-pltfm-westus-fixapi" >> $GITHUB_OUTPUT
          echo "webapp_name=app-amp-qa-pltfm-westus-fixapi" >> $GITHUB_ENV

# 🚫 PR creation (UPDATED condition only)
  create-qa-pr:
    name: Auto-create PR
    if: ${{ github.event_name == 'push' && (startsWith(github.ref_name, 'consolidate/api/') || startsWith(github.ref_name, 'qa/api-poc')) && contains(github.ref_name, 'EPIC-') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PLATFORM_GIT_TOKEN }}
          persist-credentials: true

      - name: Create PR
        run: echo "PR logic executed"

# 🚀 Existing Deploy (UNCHANGED)
  deploy:
    needs: deploy-approval
    if: ${{ github.event_name == 'push' && !startsWith(github.ref_name, 'feature/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.PLATFORM_AZURE_CREDENTIALS_DEV_AMPLIFY_DEV_SANDBOX_SP }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "your-app-name"
          package: ./myapp

# 🔔 Teams Notification (ADDED)
  notify-teams:
    name: Notify Teams
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Send notification
        run: |
          STATUS="${{ job.status }}"
          MSG="Repo: ${{ github.repository }} | Branch: ${{ github.ref_name }} | Status: $STATUS"

          curl -H "Content-Type: application/json" \
          -d "{\"text\": \"$MSG\"}" \
          ${{ secrets.TEAMS_WEBHOOK_URL }}
